<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Minigin Web</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        canvas.emscripten {
            border: 0;
            background-color: black;
        }

        #canvas {
            display: block;
        }

        #status {
            color: white;
            font-family: monospace;
            padding: 10px;
            text-align: center;
        }

        #output {
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }

        .error {
            color: #f00 !important;
        }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="output"></div>
    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var outputElement = document.getElementById('output');

        var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
        return function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
        outputElement.innerHTML += text + '<br>';
        outputElement.scrollTop = outputElement.scrollHeight;
        };
        })(),
        printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
        outputElement.innerHTML += '<span class="error">ERROR: ' + text + '</span><br>';
        outputElement.scrollTop = outputElement.scrollHeight;
        },
        canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener("webglcontextlost", function(e) {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
        }, false);
        return canvas;
        })(),
        setStatus: function(text) {
        if (!text) {
        statusElement.style.display = 'none';
        } else {
        statusElement.innerHTML = text;
        console.log('[Status] ' + text);
        }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
        };
        Module.setStatus('Downloading...');
        window.onerror = function(event, source, lineno, colno, error) {
        Module.setStatus('Exception thrown, see JavaScript console');
        console.error('Error:', event, 'at', source, lineno, colno, error);
        Module.printErr('Uncaught exception: ' + event);
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
